<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Manutenção</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at top, #0c1230 0%, #050814 60%, #02040f 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: left;
    }

    .content {
      max-width: 900px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 18px;
      color: #dcdcdc;
    }

    a {
      color: #ff8c42;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      word-break: break-all;
    }

    a:hover {
      text-decoration: underline;
    }

    /* estrelas sutis no fundo */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.3), transparent);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="content">
      <h1>
        Que triste... O script esta off por enquanto.    
       
         mais relaxa que logo logo retornará!
        enquanto isso da uma passada no nosso servidor, é de graça!
      </h1>

      <a href="https://discord.gg/d4eJTDYVC">
        https://discord.gg/d4eJTDYVC
      </a>
    </div>
  </div>
</body>
</html>
