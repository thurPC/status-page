<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Manutenção</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at top, #0c1230 0%, #050814 60%, #02040f 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, #fff, transparent),
        radial-gradient(1px 1px at 30% 80%, #fff, transparent),
        radial-gradient(1px 1px at 70% 40%, #fff, transparent),
        radial-gradient(1px 1px at 90% 60%, #fff, transparent);
      opacity: 0.25;
      animation: moveStars 60s linear infinite;
      pointer-events: none;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .content {
      max-width: 900px;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    a {
      color: #ff8c42;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      position: relative;
    }

    a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: #ff8c42;
      transition: width 0.3s ease;
    }

    a:hover::after {
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
        text-align: center;
      }

      .content {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="container">
    <div class="content">
      <h1>
        Que triste... o script está off por enquanto.<br>
        Mas relaxa que logo retornará!<br>
        Enquanto isso, dá uma passada no nosso servidor para atualizações — é de graça!
      </h1>

      <a href="https://discord.gg/d4eJTDYVC">
        https://discord.gg/d4eJTDYVC
      </a>
    </div>
  </div>
</body>
</html>
