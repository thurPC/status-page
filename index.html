<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Em Manutenção :( </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at top, #0c1230 0%, #050814 60%, #02040f 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    /* 🌌 estrelas */
    .stars {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, #fff, transparent),
        radial-gradient(1px 1px at 30% 80%, #fff, transparent),
        radial-gradient(1px 1px at 70% 40%, #fff, transparent),
        radial-gradient(1px 1px at 90% 60%, #fff, transparent);
      opacity: 0.55;
      animation: moveStars 60s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to   { transform: translateY(-200px); }
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .content {
      max-width: 900px;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    /* 🔗 link discord */
    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 30px;
      color: #ff8c42;
      font-size: 1.15rem;
      font-weight: 600;
      text-decoration: none;
    }

    .discord-icon {
  display: flex;
  transform: translateX(-80px); /* move pra esquerda */
  animation: float 2.5s ease-in-out infinite;
}

    .discord-link:hover .discord-icon {
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes float {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.15); }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
        text-align: center;
      }

      .content {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="container">
    <div class="content">
      <h1>
        Que triste... o script está off por enquanto.<br>
        Mas relaxa que logo retornará!<br>
        Enquanto isso, dá uma passada no nosso servidor para atualizações — é de graça!
