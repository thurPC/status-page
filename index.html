<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Manutenção</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at top, #0c1230 0%, #050814 60%, #02040f 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    /* 🌌 estrelas */
    .stars {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1px 1px at 10% 20%, #fff, transparent),
        radial-gradient(1px 1px at 30% 80%, #fff, transparent),
        radial-gradient(1px 1px at 70% 40%, #fff, transparent),
        radial-gradient(1px 1px at 90% 60%, #fff, transparent);
      opacity: 0.35;
      animation: moveStars 60s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to   { transform: translateY(-200px); }
    }

    .container {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .content {
      max-width: 900px;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    /* 🔗 link discord */
    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ff8c42;
      font-size: 1.15rem;
      font-weight: 600;
      text-decoration: none;
    }

    .discord-icon {
  display: flex;
  margin-left: -10px; /* puxa o ícone pra esquerda */
  animation: float 2.5s ease-in-out infinite;
    }

    .discord-link:hover .discord-icon {
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes float {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.15); }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
        text-align: center;
      }

      .content {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>

  <div class="container">
    <div class="content">
      <h1>
        Que triste... o script está off por enquanto.<br>
        Mas relaxa que logo retornará!<br>
        Enquanto isso, dá uma passada no nosso servidor para atualizações — é de graça!
      </h1>

      <a class="discord-link" href="https://discord.gg/d4eJTDYVC">
        <span class="discord-icon">
          <span class="discord-icon">
  <svg
    width="28"
    height="28"
    viewBox="0 0 24 24"
    fill="#ff8c42"
    xmlns="http://www.w3.org/2000/svg">

    <path d="M20.317 4.369a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.211.375-.444.864-.608 1.249a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.249.077.077 0 00-.079-.037 19.736 19.736 0 00-4.885 1.515.07.07 0 00-.032.027C.533 9.046-.32 13.579.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.873-1.295 1.226-1.994a.076.076 0 00-.041-.105 13.107 13.107 0 01-1.872-.9.077.077 0 01-.008-.128c.126-.094.252-.192.371-.291a.074.074 0 01.077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 01.078.01c.12.099.246.197.372.291a.077.077 0 01-.006.128 12.299 12.299 0 01-1.873.899.076.076 0 00-.04.106c.36.698.772 1.363 1.225 1.993a.077.077 0 00.084.028 19.876 19.876 0 005.994-3.03.077.077 0 00.031-.056c.5-5.177-.838-9.673-3.548-13.66a.061.061 0 00-.031-.028z"/>
  </svg>
</span>
        <span>discord.gg/Baguncinha</span>
      </a>
    </div>
  </div>
</body>
</html>
